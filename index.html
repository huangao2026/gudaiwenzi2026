<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>古文AI老师</title>
<style>
body{
  max-width:700px;
  margin:60px auto;
  font-size:18px;
  font-family:serif;
}
textarea{
  width:100%;
  height:120px;
}
button{
  padding:10px 20px;
  font-size:16px;
}
</style>
</head>

<body>

<h1>古文AI老师</h1>

<p>输入古文：</p>

<textarea id="text"></textarea>

<br><br>

<button onclick="translate()">解释古文</button>

<pre id="result"></pre>

<script>
async function translate(){
  let text = document.getElementById("text").value;
  let res = await fetch("/api/translate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({text})
  });
  let data = await res.json();
  document.getElementById("result").innerText = data.result;
}
</script>

</body>
</html>
